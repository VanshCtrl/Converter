<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumConvert // Linear & Mass Metrics</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151b2c;
            --accent-blue: #3b82f6;
            --text-light: #f3f4f6;
            --text-dim: #9ca3af;
            --border: #242f4d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
        }

        .wrapper {
            max-width: 600px;
            margin: 40px auto;
        }

        header {
            margin-bottom: 30px;
            border-left: 4px solid var(--accent-blue);
            padding-left: 15px;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .panel-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .convert-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .convert-card h2 {
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .input-row:last-child {
            margin-bottom: 0;
        }

        .field-group {
            flex: 1;
        }

        label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input[type="number"] {
            width: 100%;
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 12px;
            box-sizing: border-box;
            font-size: 16px;
            border-radius: 6px;
            font-family: monospace;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        /* Removes scroll arrows on chrome/safari/numeric inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>QUANTUM_CONVERT // v1.0.0</h1>
        <p style="color: var(--text-dim); margin: 5px 0 0 0; font-size: 12px;">High-precision real-time physical metric processing engine.</p>
    </header>

    <div class="panel-grid">
        <!-- MASS CALCULATION MATRIX -->
        <div class="convert-card">
            <h2>[Mass Matrix Execution]</h2>
            <div class="input-row">
                <div class="field-group">
                    <label>Pounds (lbs)</label>
                    <input type="number" id="input-lbs" placeholder="0.00" oninput="processMassConversion('lbs')">
                </div>
                <div style="color: var(--text-dim); margin-top: 18px;">⇄</div>
                <div class="field-group">
                    <label>Kilograms (kg)</label>
                    <input type="number" id="input-kg" placeholder="0.00" oninput="processMassConversion('kg')">
                </div>
            </div>
        </div>

        <!-- LINEAR CALCULATION MATRIX -->
        <div class="convert-card">
            <h2>[Linear Space Execution]</h2>
            <div class="input-row">
                <div class="field-group">
                    <label>Feet (ft)</label>
                    <input type="number" id="input-ft" placeholder="0.00" oninput="processLinearConversion('ft')">
                </div>
                <div style="color: var(--text-dim); margin-top: 18px;">⇄</div>
                <div class="field-group">
                    <label>Meters (m)</label>
                    <input type="number" id="input-m" placeholder="0.00" oninput="processLinearConversion('m')">
                </div>
            </div>
        </div>
    </div>
</div>

<script src="engine.js"></script>
</body>
</html>
